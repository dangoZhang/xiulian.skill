    <text x="600" y="830" fill="#4C2412" font-size="28" text-anchor="middle" font-family="STKaiti, KaiTi, serif" font-weight="700"><tspan x="600" dy="0">照此行迹，已至金丹之境。</tspan><tspan x="600" dy="38">气机相合已成气候，往返有序，彼此呼应，推进时</tspan><tspan x="600" dy="38">不乱。</tspan><tspan x="600" dy="38">收功不稳未稳，收功时看得还不够细，结果尚未盯</tspan><tspan x="600" dy="38">紧。</tspan><tspan x="600" dy="38">此番 4 条对话，2 次分身，耗去 2,892 枚灵气。</tspan></text>

    <text x="150" y="1188" fill="#F5F7FA" font-size="30" text-anchor="start" font-family="PingFang SC, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-weight="500"><tspan x="150" dy="0">下一层看的是能不能把顺手打法沉成可复用套路。下一轮先</tspan><tspan x="150" dy="40">盯住结果验证和回看确认，把目标、执行、验证接成一条完</tspan><tspan x="150" dy="40">整回路。</tspan></text>
